<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arrow Ticket</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

</head>

<body>

<div id="app">

<!-- NAVBAR -->
<nav
:class="darkMode ? 'bg-slate-950' : 'bg-indigo-900'"
class="text-white shadow-xl"
>

<div class="container mx-auto px-4 py-4 flex justify-between items-center">

<h1 class="text-3xl font-black">
Arrow Ticket
</h1>

<div class="flex items-center gap-4">

<button
@click="darkMode=!darkMode"
class="w-10 h-10 rounded-full bg-white/10"
>
<i :class="darkMode ? 'fas fa-sun' : 'fas fa-moon'"></i>
</button>

<div v-if="currentUser">

<p class="font-black">
{{ currentUser.name }}
</p>

<p class="text-xs text-indigo-200">
{{ currentUser.role }}
</p>

</div>

</div>

</div>

</nav>

<!-- MAIN -->
<div
:class="darkMode
? 'bg-slate-950 text-white'
: 'bg-slate-100 text-slate-800'"

class="min-h-screen"
>

<div class="container mx-auto px-4 py-10">

<!-- LOGIN -->
<div
v-if="page==='login'"
class="max-w-md mx-auto"
>

<div
:class="darkMode ? 'bg-slate-900' : 'bg-white'"
class="rounded-3xl p-8 shadow-2xl"
>

<h2 class="text-4xl font-black text-center mb-6">
Đăng nhập
</h2>

<div class="space-y-4">

<input
v-model="loginForm.email"
type="email"
placeholder="Email"
class="w-full px-4 py-4 rounded-2xl border text-black"
/>

<input
v-model="loginForm.password"
type="password"
placeholder="Mật khẩu"
class="w-full px-4 py-4 rounded-2xl border text-black"
/>

<button
@click="processLogin"
class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black"
>
Đăng nhập
</button>

<div class="text-center">

<button
@click="page='register'"
class="text-indigo-500 font-black"
>
Tạo tài khoản
</button>

</div>

</div>

</div>

</div>

<!-- REGISTER -->
<div
v-else-if="page==='register'"
class="max-w-md mx-auto"
>

<div
:class="darkMode ? 'bg-slate-900' : 'bg-white'"
class="rounded-3xl p-8 shadow-2xl"
>

<h2 class="text-4xl font-black text-center mb-6">
Đăng ký
</h2>

<div class="space-y-4">

<input
v-model="registerForm.name"
placeholder="Họ tên"
class="w-full px-4 py-4 rounded-2xl border text-black"
/>

<input
v-model="registerForm.email"
placeholder="Email"
class="w-full px-4 py-4 rounded-2xl border text-black"
/>

<input
v-model="registerForm.password"
type="password"
placeholder="Mật khẩu"
class="w-full px-4 py-4 rounded-2xl border text-black"
/>

<button
@click="registerAccount"
class="w-full py-4 rounded-2xl bg-green-600 text-white font-black"
>
Đăng ký
</button>

<div class="text-center">

<button
@click="page='login'"
class="text-indigo-500 font-black"
>
Quay lại
</button>

</div>

</div>

</div>

</div>

<!-- HOME -->
<div v-else>

<div class="flex justify-between items-center mb-10">

<h2 class="text-5xl font-black">
Sự kiện nổi bật
</h2>

<button
@click="logout"
class="px-5 py-3 rounded-2xl bg-red-500 text-white font-black"
>
Đăng xuất
</button>

</div>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

<div
v-for="event in events"
:key="event.id"

:class="darkMode
? 'bg-slate-900 border border-slate-800'
: 'bg-white'"

class="rounded-3xl overflow-hidden shadow-2xl"
>

<img
:src="event.image"
class="w-full h-60 object-cover"
/>

<div class="p-6">

<h3 class="text-3xl font-black mb-3">
{{ event.name }}
</h3>

<p class="text-slate-500 mb-4">
{{ event.description }}
</p>

<div class="text-pink-500 font-black mb-4">
{{ event.countdown }}
</div>

<div class="grid grid-cols-5 gap-2 mb-5">

<button
v-for="seat in seats"

@click="selectSeat(event.id,seat)"

:class="selectedSeats[event.id]===seat
? 'bg-green-500 text-white'
: 'bg-slate-200 text-black'"

class="h-10 rounded-xl font-black"
>

{{ seat }}

</button>

</div>

<select
v-model="selectedTicket[event.id]"
class="w-full px-4 py-4 rounded-2xl border text-black mb-4"
>

<option disabled value="">
Chọn loại vé
</option>

<option
v-for="ticket in event.ticketTypes"
:value="ticket"
>
{{ ticket.name }} -
{{ formatPrice(ticket.price) }}
</option>

</select>

<button
@click="buyTicket(event)"
class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black"
>
Thanh toán
</button>

</div>

</div>

</div>

</div>

</div>

<!-- PAYMENT -->
<div
v-if="showPayment"
class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
>

<div class="bg-white rounded-3xl p-8 max-w-md w-full">

<h2 class="text-3xl font-black text-center mb-6">
Thanh toán
</h2>

<div class="grid grid-cols-2 gap-4 mb-6">

<button
@click="paymentMethod='MoMo'"

:class="paymentMethod==='MoMo'
? 'bg-pink-500 text-white'
: 'bg-slate-100'"

class="py-4 rounded-2xl font-black"
>
MoMo
</button>

<button
@click="paymentMethod='VNPay'"

:class="paymentMethod==='VNPay'
? 'bg-blue-500 text-white'
: 'bg-slate-100'"

class="py-4 rounded-2xl font-black"
>
VNPay
</button>

</div>

<div
id="paymentQR"
class="flex justify-center mb-6"
>
</div>

<button
@click="confirmPayment"
class="w-full py-4 rounded-2xl bg-green-600 text-white font-black"
>
Xác nhận thanh toán
</button>

</div>

</div>

<!-- LOADING -->
<div
v-if="paymentLoading"
class="fixed inset-0 bg-black/80 flex items-center justify-center z-50"
>

<div class="text-center text-white">

<div
class="w-24 h-24 border-8 border-white border-t-transparent rounded-full animate-spin mx-auto mb-6"
>
</div>

<h2 class="text-3xl font-black">
Đang xử lý thanh toán...
</h2>

</div>

</div>

</div>

<script>

const { createApp } = Vue;

createApp({

data(){

return{

page:'login',

darkMode:false,

showPayment:false,

paymentLoading:false,

paymentMethod:'MoMo',

selectedEvent:null,

selectedTicket:{},

selectedSeats:{},

currentUser:null,

loginForm:{
email:'',
password:''
},

registerForm:{
name:'',
email:'',
password:''
},

seats:[
'A1','A2','A3','A4','A5',
'B1','B2','B3','B4','B5'
],

users: JSON.parse(
localStorage.getItem('arrow_users')
) || [

{
name:'Admin',
email:'admin@gmail.com',
password:'123456',
role:'admin'
},

{
name:'User',
email:'user@gmail.com',
password:'123456',
role:'user'
}

],

events:[

{
id:'EVT001',
name:'Lễ hội EDM',
description:'Đại nhạc hội EDM lớn nhất năm',
image:'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=800&q=80',

ticketTypes:[
{
name:'GA',
price:500000
},
{
name:'VIP',
price:1500000
}
],

startTime:'2026-12-31T20:00:00',

countdown:''

}

]

}

},

methods:{

formatPrice(val){

return new Intl.NumberFormat(
'vi-VN',
{
style:'currency',
currency:'VND'
}
).format(val);

},

processLogin(){

const found=this.users.find(

u=>

u.email===this.loginForm.email &&

u.password===this.loginForm.password

);

if(!found){

alert('Sai tài khoản');

return;

}

localStorage.setItem(
'arrow_current_user',
JSON.stringify(found)
);

if(found.role==='admin'){

window.location.href='admin.html';

return;

}

this.currentUser=found;

this.page='home';

},

registerAccount(){

const existed=this.users.find(
u=>u.email===this.registerForm.email
);

if(existed){

alert('Email tồn tại');

return;

}

const newUser={

name:this.registerForm.name,

email:this.registerForm.email,

password:this.registerForm.password,

role:'user'

};

this.users.push(newUser);

localStorage.setItem(
'arrow_users',
JSON.stringify(this.users)
);

alert('Đăng ký thành công');

this.page='login';

},

buyTicket(event){

if(!this.selectedTicket[event.id]){

alert('Chọn loại vé');

return;

}

if(!this.selectedSeats[event.id]){

alert('Chọn ghế');

return;

}

this.selectedEvent=event;

this.showPayment=true;

this.$nextTick(()=>{

document.getElementById(
'paymentQR'
).innerHTML='';

new QRCode(
document.getElementById('paymentQR'),
{
text:'Thanh toán '+event.name,
width:220,
height:220
}
);

});

},

selectSeat(eventId,seat){

this.selectedSeats[eventId]=seat;

},

confirmPayment(){

this.paymentLoading=true;

setTimeout(()=>{

const tickets=JSON.parse(
localStorage.getItem('arrow_tickets')
) || [];

const ticket={

code:'TKT'+Math.floor(Math.random()*999999),

customerName:this.currentUser.name,

customerEmail:this.currentUser.email,

eventName:this.selectedEvent.name,

ticketTypeName:this.selectedTicket[this.selectedEvent.id].name,

pricePaid:this.selectedTicket[this.selectedEvent.id].price,

seat:this.selectedSeats[this.selectedEvent.id],

paymentMethod:this.paymentMethod,

status:'Chưa check-in',

used:false,

createdAt:new Date().toLocaleString('vi-VN')

};

tickets.push(ticket);

localStorage.setItem(
'arrow_tickets',
JSON.stringify(tickets)
);

this.paymentLoading=false;

this.showPayment=false;

alert('Thanh toán thành công');

this.downloadTicket(ticket);

},3000);

},

downloadTicket(ticket){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.setFontSize(22);

doc.text('ARROW TICKET',20,20);

doc.text(`Mã vé: ${ticket.code}`,20,40);

doc.text(`Khách hàng: ${ticket.customerName}`,20,55);

doc.text(`Sự kiện: ${ticket.eventName}`,20,70);

doc.text(`Ghế: ${ticket.seat}`,20,85);

doc.text(`Thanh toán: ${ticket.paymentMethod}`,20,100);

doc.save(ticket.code+'.pdf');

},

updateCountdown(){

this.events.forEach(event=>{

const now=new Date().getTime();

const distance=
new Date(event.startTime).getTime()-now;

if(distance<=0){

event.countdown='Đang diễn ra';

return;

}

const days=Math.floor(
distance/(1000*60*60*24)
);

const hours=Math.floor(
(distance%(1000*60*60*24))
/
(1000*60*60)
);

const minutes=Math.floor(
(distance%(1000*60*60))
/
(1000*60)
);

event.countdown=
`${days} ngày ${hours} giờ ${minutes} phút`;

});

},

logout(){

localStorage.removeItem(
'arrow_current_user'
);

location.reload();

}

},

mounted(){

const savedUser=localStorage.getItem(
'arrow_current_user'
);

if(savedUser){

const user=JSON.parse(savedUser);

if(user.role==='admin'){

window.location.href='admin.html';

}else{

this.currentUser=user;

this.page='home';

}

}

setInterval(()=>{

this.updateCountdown();

},1000);

}

}).mount('#app');

</script>

</body>
</html>
